- name: cocoindex-code:claude
  from: cocoindex-code
  to: claude
  skip_if: |
    claude mcp get cocoindex-code >/dev/null 2>&1
  configure: |
    claude mcp add cocoindex-code -- ccc mcp

- name: cocoindex-code:copilot
  from: cocoindex-code
  to: copilot
  skip_if: |
    test -f "$HOME/.copilot/mcp-config.json" && \
      jq -e '.mcpServers."cocoindex-code"' "$HOME/.copilot/mcp-config.json" >/dev/null 2>&1
  configure: |
    mkdir -p "$HOME/.copilot"
    MCP_CONFIG="$HOME/.copilot/mcp-config.json"
    if [ ! -f "$MCP_CONFIG" ]; then
      echo '{"mcpServers":{}}' > "$MCP_CONFIG"
    fi
    jq '.mcpServers["cocoindex-code"] = {"type": "local", "command": "ccc", "args": ["mcp"], "tools": ["*"]}' \
      "$MCP_CONFIG" > "$MCP_CONFIG.tmp" && mv "$MCP_CONFIG.tmp" "$MCP_CONFIG"

- name: cocoindex-code:opencode
  from: cocoindex-code
  to: opencode
  skip_if: |
    test -f "$HOME/.config/opencode/opencode.json" && \
      jq -e '.mcp."cocoindex-code"' "$HOME/.config/opencode/opencode.json" >/dev/null 2>&1
  configure: |
    OPENCODE_CONFIG="$HOME/.config/opencode/opencode.json"
    mkdir -p "$HOME/.config/opencode"
    if [ ! -f "$OPENCODE_CONFIG" ]; then
      printf '{"$schema":"https://opencode.ai/config.json","mcp":{}}\n' > "$OPENCODE_CONFIG"
    fi
    jq '.mcp["cocoindex-code"] = {"type": "local", "command": ["ccc", "mcp"], "enabled": true}' \
      "$OPENCODE_CONFIG" > "$OPENCODE_CONFIG.tmp" && mv "$OPENCODE_CONFIG.tmp" "$OPENCODE_CONFIG"

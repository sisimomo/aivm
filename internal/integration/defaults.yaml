- from: rtk
  to: claude
  when: installed
  configure: |
    rtk init -g --auto-patch 2>/dev/null || true

- from: rtk
  to: copilot
  when: installed
  configure: |
    rtk init -g --auto-patch 2>/dev/null || true

- name: mcp:claude
  to: claude
  configure: |
    MCP_FILE="$HOME/.claude/mcp-config.json"
    mkdir -p "$(dirname "$MCP_FILE")"

    [ -f "$MCP_FILE" ] || echo '{}' > "$MCP_FILE"

    jq '
      .mcpServers.mcpjungle = {
        type: "http",
        url: "http://host.lima.internal:{{ .mcp_port }}/mcp"
      }
    ' "$MCP_FILE" > "$MCP_FILE.tmp" && mv "$MCP_FILE.tmp" "$MCP_FILE"

- name: mcp:copilot
  to: copilot
  configure: |
    MCP_FILE="$HOME/.config/gh-copilot/mcp-config.json"
    mkdir -p "$(dirname "$MCP_FILE")"

    [ -f "$MCP_FILE" ] || echo '{}' > "$MCP_FILE"

    jq '
      .mcpServers.mcpjungle = {
        type: "http",
        url: "http://host.lima.internal:{{ .mcp_port }}/mcp"
      }
    ' "$MCP_FILE" > "$MCP_FILE.tmp" && mv "$MCP_FILE.tmp" "$MCP_FILE"

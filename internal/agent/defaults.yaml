claude:
  enable: false
  description: "Claude Code (Anthropic)"
  dependencies:
    - mise-node
  path_entries:
    - "$HOME/.claude/local/bin"
  persist:
    - .claude/projects
  launch_command: 'claude --dangerously-skip-permissions'
  skip_if: |
    claude --version >/dev/null 2>&1
  setup: |
    curl -fsSL https://claude.ai/install.sh | bash

copilot:
  enable: false
  description: "GitHub Copilot CLI (copilot cli)"
  persist:
    - .copilot/session-state
  launch_command: "copilot --yolo"
  skip_if: |
    copilot --version >/dev/null 2>&1
  setup: |
    curl -fsSL https://gh.io/copilot-install | bash

opencode:
  enable: false
  description: "OpenCode CLI"
  dependencies:
    - system
  path_entries:
    - "$HOME/.opencode/bin"
  launch_command: "opencode --dangerously-skip-permissions"
  persist:
    - .local/state/opencode
  skip_if: |
    opencode --version >/dev/null 2>&1
  setup: |
    curl -fsSL https://opencode.ai/install | bash

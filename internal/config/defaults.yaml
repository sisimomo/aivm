vm:
  cpus: 4
  memory: 8
  disk: 60
  type: vz
  max_age_days: 7
  base_image_max_age_days: 7
  dev_root: "~/dev"
  profile: aivm

mcp_jungle:
  enable: true
  port: 7593
  image_tag: latest-stdio
  server_mode: development

idle:
  timeout: 5m
  delete_timeout: 5m

agents:
  enabled: claude

plugins:
  enabled:
    - system
    - java
    - maven
    - nodejs
    - python
    - rtk

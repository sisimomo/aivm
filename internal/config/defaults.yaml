vm:
  cpus: 4
  memory: "8GB"
  disk: "60GB"
  mounts:
    - "~/dev:rw"
  name: aivm
  backend: lima
  recreate_prompt_after: "7d"
  base_image_enable: true
  bootstrap_refresh_prompt_after: "30d"

t3code:
  enable: false
  port: 3773

idle:
  stop_timeout: 5m
  delete_timeout: 5m
  poll_interval: 30s

plugins:
  enabled:
    - system

log_level: info


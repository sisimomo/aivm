system:
  description: "System packages (apt: git, curl, jq, unzip, zip, etc.)"
  skip_if: |
    which jq >/dev/null 2>&1 && \
    which gcc >/dev/null 2>&1 && \
    which make >/dev/null 2>&1 && \
    ldconfig -p | grep -q libatomic.so
  setup: |
    export DEBIAN_FRONTEND=noninteractive
    sudo apt-get -o Acquire::Retries=3 update -qq
    sudo apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
      git curl wget unzip zip ca-certificates gnupg lsb-release \
      bash-completion jq libatomic1 build-essential

mise:
  description: "mise-en-place — universal runtime version manager"
  dependencies:
    - system
  path_entries:
    - "$HOME/.local/bin"
    - "$HOME/.local/share/mise/shims"
  skip_if: |
    mise --version >/dev/null 2>&1 && grep -q 'mise activate' ~/.bashrc
  setup: |
    curl https://mise.run | sh
    grep -q 'mise activate' ~/.bashrc || echo 'eval "$(mise activate bash)"' >> ~/.bashrc

awscli:
  description: "AWS CLI v2"
  dependencies:
    - system
  skip_if: |
    aws --version >/dev/null 2>&1
  setup: |
    export DEBIAN_FRONTEND=noninteractive
    ARCH=$(uname -m)
    if [ "$ARCH" = "aarch64" ]; then
      AWS_URL="https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip"
    else
      AWS_URL="https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
    fi
    curl -fsSL "$AWS_URL" -o /tmp/awscliv2.zip
    unzip -q /tmp/awscliv2.zip -d /tmp/awscliv2
    sudo /tmp/awscliv2/aws/install
    rm -rf /tmp/awscliv2.zip /tmp/awscliv2

cocoindex-code:
  description: "Cocoindex Code — AST-based semantic code search (MCP server)"
  dependencies:
    - mise-uv
    - mise-node
  defaults:
    variant: "full"
  skip_if: |
    command -v ccc >/dev/null 2>&1{{ if .config }} && \
      test -f "$HOME/.cocoindex_code/global_settings.yml"{{ end }}
  setup: |
    {{ if eq .variant "slim" }}
    uv tool install --upgrade 'cocoindex-code'
    {{ else }}
    uv tool install --upgrade 'cocoindex-code[full]'
    {{ end }}
    {{ if .config }}
    mkdir -p "$HOME/.cocoindex_code"
    printf '%s' '{{ .config | toYAML | b64enc }}' | base64 -d > "$HOME/.cocoindex_code/global_settings.yml"
    chmod 600 "$HOME/.cocoindex_code/global_settings.yml"
    {{ end }}
    npx skills@latest add cocoindex-io/cocoindex-code --global --all

skills:
  description: "Install agent skills via the skills CLI (https://github.com/vercel-labs/skills)"
  dependencies:
    - mise-node
  setup: |
    {{ range .sources -}}
    npx skills@latest add "{{ .repo }}" --global{{ if .skills }} --yes --agent '*'{{ range .skills }} --skill "{{ . }}"{{ end }}{{ else }} --all{{ end }}
    {{ end -}}

t3code:
  description: "T3 Code web GUI for AI coding agents"
  dependencies:
    - mise-node
    - mise-npm
  skip_if: |
    command -v t3 >/dev/null 2>&1
  setup: |
    npm install -g t3
    mise reshim

    {{ if .state_dir }}
    T3_DIR="{{ .state_dir }}/.t3"
    mkdir -p "$T3_DIR"
    # Make the directory world-writable with sticky bit so the container user
    # (which may differ from the host user) can write to it, but only file
    # owners can remove their own files (prevents accidental deletions).
    sudo chmod 1777 "$T3_DIR"
    ln -sfn "$T3_DIR" "$HOME/.t3"
    {{ end }}

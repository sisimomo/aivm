vm:
  name: aivm-demo
  cpus: 4
  memory: "6GB"
  disk: "40GB"
  mounts:
    - "~/dev:rw"

agents:
  default: opencode
  enabled:
    - claude
    - copilot
    - opencode

t3code:
  enable: true

plugins:
  enabled:
    - mise-node
    - mise-python
    - mise-go
    - mise-java
    - mise-maven
    - skills
  config:
    mise-java:
      version: "25"
    skills:
      sources:
        - repo: mattpocock/skills

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: make test-unit

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        run: make test-integration

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install aivm-test binary
        run: make install-test

      - name: Add aivm-test to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run end to end tests
        run: go test -tags integration -v -timeout 15m -parallel 7 ./test/e2e/

  test-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install aivm-test binary
        run: make install-test

      - name: Add aivm-test to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run bootstrap tests
        run: go test -tags bootstrap -v -timeout 15m -parallel 7 ./test/bootstrap/

  release:
    needs: [test-unit, test-e2e, test-bootstrap]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

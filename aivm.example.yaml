# aivm configuration
# Copy to aivm.yaml: cp aivm.example.yaml aivm.yaml

# Active agent — claude, copilot, or opencode.
# Authentication is handled inside the VM on first launch.
agents:
  enabled: claude

# VM resources — tune to your machine.
vm:
  cpus: 4
  memory: "8GB"
  disk: "60GB"    # supports MB, GB, TB

  # Directories to mount into the VM. Format: <host_path>:<mode>
  # mode: rw (read-write, default) or ro (read-only)
  # ~ is expanded to your home directory.
  mounts:
    - "~/dev:rw"
    - "~/.ssh:ro"

  # Arbitrary environment variables injected into every VM session.
  # Values support ${HOST_VAR} expansion from the host shell environment.
  # Changes are applied in-place the next time you run aivm — no VM recreation needed.
  # env:
  #   MY_API_TOKEN: "${MY_API_TOKEN}"
  #   CUSTOM_SETTING: "some-value"

# Idle VM management.
idle:
  stop_timeout: 5m      # stop VM after this much idle time
  delete_timeout: 5m    # delete stopped VM after this long

# T3 Code web GUI (optional).
# When enabled, `aivm launch` starts t3 serve inside the VM and port-forwards
# it to http://localhost:<port> on the host, letting you interact with your
# configured agent in a browser instead of a terminal.
#
# Notes:
#   - idle monitoring is automatically disabled in this mode (the VM runs until
#     you explicitly run `aivm stop`)
#   - agents.enabled is still required — T3 Code is a frontend, not an agent
#   - `aivm stop` / `aivm destroy` kill the port-forward tunnel automatically
# t3code:
#   enable: false
#   port: 3773

# Per-plugin configuration — override the version for any mise-* plugin.
# plugins:
#   config:
#     mise-node:
#       version: "20"
#     mise-java:
#       version: "21"
#     mise-go:
#       version: "1.22.4"
#     mise-python:
#       version: "3.11.9"

# Add mise-based tools or custom plugins.
# Any tool in the mise registry (https://mise.jdx.dev/registry.html)
# is available as mise-<tool>.
# plugins:
#   enabled:
#     - mise-node
#     - mise-go
#     - mise-rust
#   define:
#     my-tool:
#       description: "My custom tool"
#       dependencies: [system]
#       skip_if: |
#         my-tool --version >/dev/null 2>&1
#       setup: |
#         curl -fsSL https://example.com/install.sh | sh

# Override an agent's launch command or install steps.
# agents:
#   define:
#     copilot:
#       launch_command: "gh copilot suggest"

# Custom integrations — run a script when a plugin is installed and an agent is active.
# integrations:
#   - from: my-tool
#     to: claude
#     skip_if: |
#       my-tool status --agent claude >/dev/null 2>&1
#     configure: |
#       my-tool configure --agent claude

# Docker Compose file — services started and stopped with the VM.
# Point to a standard docker-compose.yml (relative to this file or absolute).
# All services are brought up with `docker compose up -d` when the VM starts,
# and torn down with `docker compose down` (or `down -v` for `aivm destroy`).
# The project name is set to the VM profile name.
# compose_file: ./docker-compose.yml

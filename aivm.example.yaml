# aivm configuration
# Copy to aivm.yaml: cp aivm.example.yaml aivm.yaml

# Active agent — claude, copilot, or opencode.
# Authentication is handled inside the VM on first launch.
agents:
  enabled: claude

# VM resources — tune to your machine.
vm:
  cpus: 4
  memory: "8GB"
  disk: "60GB"    # supports MB, GB, TB

  # Directories to mount into the VM. Format: <host_path>:<mode>
  # mode: rw (read-write, default) or ro (read-only)
  # ~ is expanded to your home directory.
  mounts:
    - "~/dev:rw"
    - "~/.ssh:ro"

  # Arbitrary environment variables injected into every VM session.
  # Values support ${HOST_VAR} expansion from the host shell environment.
  # Changes are applied in-place the next time you run aivm — no VM recreation needed.
  # env:
  #   MY_API_TOKEN: "${MY_API_TOKEN}"
  #   CUSTOM_SETTING: "some-value"

# Idle VM management.
idle:
  stop_timeout: 5m      # stop VM after this much idle time
  delete_timeout: 5m    # delete stopped VM after this long

# T3 Code web GUI (optional).
# When enabled, `aivm launch` starts t3 serve inside the VM and port-forwards
# it to http://localhost:<port> on the host, letting you interact with your
# configured agent in a browser instead of a terminal.
#
# Notes:
#   - idle monitoring is automatically disabled in this mode (the VM runs until
#     you explicitly run `aivm stop`)
#   - agents.enabled is still required — T3 Code is a frontend, not an agent
#   - `aivm stop` / `aivm destroy` kill the port-forward tunnel automatically
# t3code:
#   enable: false
#   port: 3773

# Per-plugin configuration — override built-in defaults.
# plugins:
#   config:
#     java:
#       version: "21"
#       distribution: temurin

# aivm configuration
# Copy to aivm.yaml: cp aivm.example.yaml aivm.yaml

# Active agent — claude or copilot.
# Authentication is handled externally (run `claude auth` or `gh auth login` inside the VM).
agents:
  enabled: claude

# VM resources — tune to your machine.
vm:
  cpus: 4
  memory: 8   # GiB
  disk: 60    # GiB

# Per-plugin configuration — override built-in defaults.
# plugins:
#   config:
#     java:
#       version: "25"
#       distribution: temurin
#     nodejs:
#       version: lts
#     python:
#       tool: uv

# Add custom plugins or override built-in ones.
# plugins:
#   enabled:
#     - system
#     - nodejs
#     - rust        # your custom plugin
#   define:
#     rust:
#       description: "Rust toolchain via rustup"
#       dependencies: [system]
#       check: |
#         rustc --version >/dev/null 2>&1
#       install: |
#         curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

# Override an agent's launch command or install steps.
# agents:
#   define:
#     copilot:
#       launch_command: "gh copilot suggest"

# Custom integrations — run a script when a plugin is installed and an agent is active.
# integrations:
#   - from: my-tool
#     to: claude
#     configure: |
#       my-tool configure --agent claude

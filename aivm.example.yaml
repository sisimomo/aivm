# aivm configuration
# Copy to aivm.yaml: cp aivm.example.yaml aivm.yaml

# Agent configuration.
# List one or more agents to enable. The default agent is launched when you
# run `aivm` without --agent. All enabled agents are installed in the VM at
# bootstrap time so you can switch between them without rebuilding.
#
# To enable a single agent:
agents:
  enabled:
    - claude

# To enable multiple agents (all installed; choose default and override with --agent):
# agents:
#   enabled:
#     - claude
#     - copilot
#     - cursor
#   default: claude

# VM resources — tune to your machine.
vm:
  backend: lima
  cpus: 4
  memory: "8GB"
  disk: "60GB"    # supports MB, GB, TB
  base_image_enable: true
  recreate_prompt_after: "7d"
  bootstrap_refresh_prompt_after: "30d"

  # Directories to mount into the VM. Format: <host_path>:<mode>
  # mode: rw (read-write, default) or ro (read-only)
  # ~ is expanded to your home directory.
  mounts:
    - "~/dev:rw"
  # Arbitrary environment variables injected into every VM session.
  # Values support ${HOST_VAR} expansion from the host shell environment.
  # Changes are applied in-place the next time you run aivm — no VM recreation needed.
  # env:
  #   MY_API_TOKEN: "${MY_API_TOKEN}"
  #   CUSTOM_SETTING: "some-value"
  #
  # Session-scoped env (aivm and aivm ssh). Same ${HOST_VAR} syntax as vm.env above.
  # Resolved from the host each session; not persisted in the VM.
  # session_env:
  #   MY_TOOL_SESSION_ID: "${MY_TOOL_SESSION_ID}"
  #   CI_JOB_ID: "${CI_JOB_ID}"

# Idle VM management.
idle:
  stop_timeout: 5m      # stop VM after this much idle time
  delete_timeout: 5m    # delete stopped VM after this long

# Override an agent's CLI (cli_command), interactive flags (launch_args), or install steps.
# launch_args apply only to `aivm`; use `aivm agent -- <args>` to pass flags verbatim.
# (These can be added under agents.define.)
# agents:
#   define:
#     copilot:
#       cli_command: copilot
#       launch_args: "suggest"

# T3 Code web GUI (optional).
# When enabled, `aivm launch` starts t3 serve inside the VM and port-forwards
# it to http://localhost:<port> on the host, letting you interact with your
# configured agent in a browser instead of a terminal.
#
# Notes:
#   - idle monitoring is automatically disabled in this mode (the VM runs until
#     you explicitly run `aivm stop`)
#   - agents.default is still required — T3 Code is a frontend, not an agent
#   - `aivm stop` / `aivm destroy` kill the port-forward tunnel automatically
# t3code:
#   enable: false
#   port: 3773

# plugins:
#   enabled:
#     - system
#     - docker   # opt-in: rootful Docker inside the VM

# Per-plugin configuration — override the version for any mise-* plugin.
# plugins:
#   config:
#     mise-node:
#       version: "20"
#     mise-java:
#       version: "21"
#     mise-go:
#       version: "1.22.4"
#     mise-python:
#       version: "3.11.9"

# Add mise-based tools or custom plugins.
# Any tool in the mise registry (https://mise.jdx.dev/registry.html)
# is available as mise-<tool>.
# plugins:
#   enabled:
#     - mise-node
#     - mise-go
#     - mise-rust
#   define:
#     my-tool:
#       description: "My custom tool"
#       dependencies: [system]
#       setup: |
#         curl -fsSL https://example.com/install.sh | sh

# Context7 — up-to-date library documentation via find-docs skill.
# Installs ctx7 globally and adds the find-docs skill to all agent directories.
# No API key required; for higher rate limits set CONTEXT7_API_KEY in vm.env above.
# plugins:
#   enabled:
#     - context7

# Cocoindex Code — AST-based semantic code search MCP server.
# When enabled, aivm installs `ccc` in the VM and automatically registers it as
# an MCP server for every active agent (Claude Code, Copilot CLI, OpenCode).
# Default variant is "full" (local embeddings, no API key required). Use "slim"
# for a lighter install that requires a cloud embedding provider.
# plugins:
#   enabled:
#     - cocoindex-code
#   config:
#     cocoindex-code:
#       variant: full   # or "slim" for cloud-only embeddings

# Slim variant example — pass any global_settings.yml keys under `config`:
# plugins:
#   enabled:
#     - cocoindex-code
#   config:
#     cocoindex-code:
#       variant: slim
#       config:                          # written verbatim to ~/.cocoindex_code/global_settings.yml
#         embedding:
#           model: voyage/voyage-code-3  # any LiteLLM-supported model
#         envs:
#           VOYAGE_API_KEY: your-api-key

# Custom integrations — run a script when a plugin is installed and an agent is active.
# integrations:
#   - from: my-tool
#     to: claude
#     configure: |
#       my-tool configure --agent claude

# Skills — install community-published open-source agent skills via the skills CLI
# (https://github.com/vercel-labs/skills). When enabled, aivm runs
# `npx skills@latest add` for each source on every bootstrap (idempotent).
# Requires mise-node (installed automatically as a dependency).
#
# Each source must specify a `repo` (GitHub shorthand or full URL). Omitting
# a `skills` list installs everything from the repo (--all); providing one
# installs only the named skills.
# plugins:
#   enabled:
#     - skills
#   config:
#     skills:
#       sources:
#         - repo: mattpocock/skills                # installs all skills
#         - repo: another-author/skills
#           skills: [tdd, grill-me]                # installs specific skills only

# Docker Compose file — services started and stopped with the VM.
# Point to a standard docker-compose.yml (relative to this file or absolute).
# All services are brought up with `docker compose up -d` when the VM starts,
# and torn down with `docker compose down`. Named volumes are never deleted.
# The project name is set to the VM profile name.
# compose_file: ./docker-compose.yml

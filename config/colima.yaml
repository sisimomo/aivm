# Colima aivm profile template.
# This file is referenced during 'colima start' via flags — it is NOT directly
# consumed by Colima as a config file. The actual Colima profile config lives at
# ~/.colima/aivm/colima.yaml and is managed by vm-start.sh.
#
# See vm-start.sh for the colima start flags derived from .env settings.

# For manual inspection or colima template editing:
#   colima template -e

cpu: 4
memory: 8
disk: 60
vmType: vz
rosetta: true    # enables Rosetta 2 for x86_64 compatibility on Apple Silicon

mounts:
  - location: ~/dev
    writable: true
    # Lima mounts this at the same absolute path inside the VM (e.g. /Users/simon/dev).
    # No path translation is needed — aivm passes the host CWD through unchanged.

# Docker is included by default in Colima VMs; no extra configuration needed.
# docker:
#   enabled: true

# SSH agent forwarding is disabled — no credentials should leak into the VM.
sshAgent: false

# DNS is handled by Lima; host.lima.internal resolves to the host machine.

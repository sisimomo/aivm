version: 2
project_name: aivm

before:
  hooks:
    - go mod tidy

builds:
  - id: aivm
    main: ./cmd/aivm
    binary: aivm
    goos: [darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  draft: false
  generate_release_notes: true

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]

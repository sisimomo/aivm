# MCPJungle — host-side Docker Compose service.
# SQLite is the default backend (no DATABASE_URL set).
# Runs on the HOST Docker runtime, separate from the aivm Colima VM.
#
# Usage:
#   DOCKER_HOST=<host_socket> docker compose -f docker-compose.mcpjungle.yml up -d
# (start-mcpjungle.sh handles socket detection automatically)

services:
  mcpjungle:
    image: ghcr.io/mcpjungle/mcpjungle:${MCPJUNGLE_IMAGE_TAG:-latest-stdio}
    container_name: mcpjungle-server
    # SQLite db is created in /data (default behaviour when DATABASE_URL is unset)
    working_dir: /data
    environment:
      SERVER_MODE: ${MCPJUNGLE_SERVER_MODE:-development}
      OTEL_ENABLED: "false"
      MCP_SERVER_INIT_REQ_TIMEOUT_SEC: ${MCP_SERVER_INIT_REQ_TIMEOUT_SEC:-30}
    ports:
      - "127.0.0.1:${MCPJUNGLE_PORT:-8080}:8080"
    volumes:
      # Persistent SQLite database directory
      - ${MCPJUNGLE_DATA_DIR:-~/.aivm/mcpjungle-data}:/data
      # Expose ~/dev as /host so stdio MCP servers can access project files
      - ${AIVM_DEV_ROOT:-~/dev}:/host:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
